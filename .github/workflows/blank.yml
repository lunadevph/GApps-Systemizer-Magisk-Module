name: Automated Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Automated Build
    runs-on: windows-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Download 7-Zip
        shell: powershell
        run: |
          $url = "https://www.7-zip.org/a/7zr.exe"
          $destination = Join-Path $env:RUNNER_TEMP "7zr.exe"

          Invoke-WebRequest `
            -Uri $url `
            -OutFile $destination `
            -UseBasicParsing

          if (-not (Test-Path $destination)) {
            throw "7zr.exe could not be downloaded."
          }

          Write-Host "Downloaded 7-Zip to $destination"

      - name: Generate release timestamp
        id: timestamp
        shell: powershell
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          "value=$timestamp" >> $env:GITHUB_OUTPUT

      - name: Run build script
        shell: cmd
        run: |
          call BuildScripts\build.bat "%RUNNER_TEMP%\7zr.exe"

      - name: Find generated ZIP
        id: zip
        shell: powershell
        run: |
          $file = Get-ChildItem `
            -Path $env:GITHUB_WORKSPACE `
            -Filter "*.zip" `
            -File |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if (-not $file) {
            throw "No ZIP file was generated."
          }

          Write-Host "Generated ZIP: $($file.FullName)"

          "path=$($file.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($file.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: automated-build-${{ steps.timestamp.outputs.value }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: automated-build-${{ steps.timestamp.outputs.value }}
          name: Automated Build ${{ steps.timestamp.outputs.value }}
          body: |
            ## Automated Build

            Automatically generated by GitHub Actions.

            **File:** `${{ steps.zip.outputs.name }}`
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Build timestamp:** `${{ steps.timestamp.outputs.value }}`
          files: ${{ steps.zip.outputs.path }}
          generate_release_notes: false
          prerelease: false
          make_latest: true

